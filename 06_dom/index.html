<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width">
		<title> Titulo de página </title>
	</head>
	<body>
	    <script>
		// Funcion 'tradicional'
		function sum(a, b){
		    let c = a + b
		    alert(c)
		}
		alert("Hola desde el HTML 5")

		// Variable que es igual a una función 
		operador = (a, b) => {
		    let c = a - b
		    alert(c)
		}

		sum(10, 25)
		operador(40, 30)
	    </script>
	</body>
</html>
